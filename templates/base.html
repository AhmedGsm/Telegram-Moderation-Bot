<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}This is a base template{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
</head>
<body>
  <main class="container">
    <!-- Hero Section -->
    <header class="hero">
      <h1><i class="fas fa-robot"></i> Telegram Moderation Bot</h1>
      <p class="tagline">Automate group moderation, backup messages, and keep your community safe.</p>
      <div class="cta-buttons">
        <a href="{{ url_for('setup') }}" class="btn btn-primary"><i class="fas fa-cogs"></i> Install Bot</a>
        <a href="{{ url_for('bot_page') }}" class="btn btn-tertiary"><i class="fas fa-play"></i> Run Bot</a>
      </div>
    </header>
    <div class="middle-content">
      <div class="menu">
        
      <!-- Menu Toggle Button 
      <button class="menu-toggle" aria-label="Toggle menu">
        <i class="fas fa-bars"></i>
      </button>-->

      <!-- Right Aside Menu -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <h3>🔧 Bot Controls</h3>
          <button class="close-menu" aria-label="Close menu">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <nav class="sidebar-nav">
          <ul>
            <li>
              <a href="#">
                <i class="fas fa-star"></i>
                <span class="menu-text">Features</span>
              </a>
            </li>
            <li>
              <a href="{{ url_for('setup') }}">
                <i class="fas fa-cogs"></i>
                <span class="menu-text">Setup</span>
              </a>
            </li>
            <li>
              <a href="{{ url_for('bot_page') }}">
                <i class="fas fa-play" ></i>
                <span class="menu-text">Run</span>
              </a>
            </li>
          </ul>
        </nav>
        <div class="sidebar-footer">
          <p>Telegram Moderation Bot v1.0</p>
        </div>
      </aside>

      <!-- Overlay for closing menu when clicking outside -->
      <div class="overlay"></div>
      </div>
      <div class="main-content">
        {% block content %}{% endblock %}
      </div>
    </div>
    <!-- Footer -->
    <footer>
      <p>&copy; 2025 Telegram Moderation Bot | Designed for Envato Clients</p>
    </footer>
  </main>

  <script>
    // JavaScript to handle menu toggle
    document.addEventListener('DOMContentLoaded', function() {

      
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Run Moderation Bot</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='bot.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="container">
    <header>
      <h1><i class="fas fa-robot"></i> Moderation Bot</h1>
      <p>No Bot is installed yet!</p>
    </header>

    <div class="form-container">
      <div class="instructions">
        <p>You need to install your bot before proceeding to run it.</p>
        <p>Click the button below to setup the bot.</p>
      </div>

      <form id="runBotForm">
        <div class="form-buttons">
          <button type="button" id="goSetupBtn" class="btn btn-primary">
            <i class="fas fa-play"></i> Go to bot installation
          </button>
        </div>
      </form>

      <div id="messageBox" class="message-box"></div>
    </div>
  </div>
<script >
      document.getElementById('goSetupBtn').addEventListener('click', function () {
    window.location.href = "{{ url_for('setup') }}";
  });

</script>
</body>
</html>

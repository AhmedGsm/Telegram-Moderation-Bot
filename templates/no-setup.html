{% extends 'base.html' %}
{% block title %}Bot Setup{% endblock %}

  {% block content %}
  <div class="container">
    <div class="small-header">
      <h1><i class="fas fa-robot"></i> Setup Required</h1>
      <p>No Bot is installed yet!</p>
    </div>

    <div class="form-container">
      <div class="instructions">
        <p>You need to install your bot before proceeding to run it.</p>
        <p>Click the button below to setup the bot.</p>
      </div>

      <form id="runBotForm">
        <div class="form-buttons">
          <button type="button" id="goSetupBtn" class="btn btn-primary">
            <i class="fas fa-play"></i> Go to bot installation
          </button>
        </div>
      </form>

      <div id="messageBox" class="message-box"></div>
    </div>
  </div>
  {% endblock %}
  
  {% block scripts %}
    <script >
          document.getElementById('goSetupBtn').addEventListener('click', function () {
        window.location.href = "{{ url_for('setup') }}";
      });

    </script>
   {% endblock %}

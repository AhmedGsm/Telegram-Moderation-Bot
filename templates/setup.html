<!-- templates/setup.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Groups IDs Fetcher</title>

    <!-- Basic meta for marketplaces -->
    <meta name="description" content="Securely fetch Telegram group and channel IDs, then save a bot configuration in one flow.">
    <meta property="og:title" content="Telegram Groups IDs Fetcher">
    <meta property="og:description" content="Secure Telegram login (code + 2FA), list groups, copy IDs, save config.">

    <!-- Preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body>
    <main class="container">
        <header>
            <h1><i class="fab fa-telegram"></i> Telegram Groups IDs Fetcher</h1>
            <p>Enter your Telegram credentials to fetch group IDs and save configuration</p>
        </header>

        <div class="form-container">
            <form id="listIdsForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="user_id">Telegram User ID *</label>
                        <input type="text" id="user_id" name="user_id" required>
                    </div>

                    <div class="form-group">
                        <label for="api_id">Telegram API ID *</label>
                        <input type="text" id="api_id" name="api_id" required>
                    </div>

                    <div class="form-group">
                        <label for="api_hash">Telegram API Hash *</label>
                        <input type="text" id="api_hash" name="api_hash" required>
                    </div>

                    <div class="form-group">
                        <label for="bot_token">Telegram Bot Token *</label>
                        <input type="text" id="bot_token" name="bot_token" required>
                    </div>



                    <div class="form-group">
                        <label for="username">Telegram Username *</label>
                        <input type="text" id="username" name="username" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Telegram Phone Number *</label>
                        <input type="tel" id="phone" name="phone" placeholder="+1234567890" required>
                    </div>
                </div>

                <div class="form-buttons">
                    <button type="button" disabled id="listGroupsBtn" title="Fill in all the fields above and click this button to list group IDs." class="btn btn-secondary">
                        <i class="fas fa-list"></i> List Groups IDs
                    </button>
                </div>

            </form>
            
            <div id="groupsContainer" class="groups-container" style="display: none;">
                <h2><i class="fas fa-users"></i> Your Groups and Channels</h2>
                <div class="groups-list" id="groupsList">
                    <!-- Groups will be displayed here -->
                </div>
            </div>
            
            <form id="registerForm" style="display: none;">
                <div class="groups-div form-grid">
                    <div class="form-group">
                        <label for="source_group">Main Group ID *</label>
                        <input type="text" id="source_group" name="source_group" required>
                    </div>

                    <div class="form-group">
                        <label for="backup_group">Moderation Group ID *</label>
                        <input type="text" id="backup_group" name="backup_group" required>
                    </div>
                </div>

                <div class="form-buttons">
                    <button type="button" id="registerBtn" disabled class="btn btn-primary" >
                        <i class="fas fa-save"></i> Register
                    </button>
                </div>
            </form>

            <div id="runBotBtnContainer" class="" style="display: none;">
                <button type="button" id="runBotBtn" class="btn btn-tertiary"  >
                    <i class="fas fa-save"></i> Run Moderation Bot Now!
                </button>
            </div>
            
            <div id="messageBox" class="message-box"></div>
        </div>

    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
